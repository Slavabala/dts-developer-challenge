{% extends "layout.html" %}

{% block content %}
<div class="govuk-grid-row">
  <div class="govuk-grid-column-two-thirds">
    <h1 class="govuk-heading-xl">Create new task</h1>

    {% if errors.length %}
    <div class="govuk-error-summary">
      <h2 class="govuk-error-summary__title">There is a problem</h2>
      <ul class="govuk-list govuk-error-summary__list">
        {% for error in errors %}
        <li><a href="#{{ error.path }}">{{ error.msg }}</a></li>
        {% endfor %}
      </ul>
    </div>
    {% endif %}

    <form method="POST" action="/tasks" novalidate>

      <div class="govuk-form-group {% if errors | selectattr('path', 'equalto', 'title') | list | length %}govuk-form-group--error{% endif %}">
        <label class="govuk-label" for="title">
          Title <span class="govuk-visually-hidden">(required)</span>
        </label>
        <input class="govuk-input" id="title" name="title" type="text" value="{{ values.title }}" required>
      </div>

      <div class="govuk-form-group">
        <label class="govuk-label" for="description">
          Description <span class="govuk-hint govuk-!-font-size-16">(optional)</span>
        </label>
        <textarea class="govuk-textarea" id="description" name="description" rows="5">{{ values.description }}</textarea>
      </div>

      <div class="govuk-form-group">
        <label class="govuk-label" for="status">Status</label>
        <select class="govuk-select" id="status" name="status">
          <option value="TODO" {% if values.status === 'TODO' or not values.status %}selected{% endif %}>To Do</option>
          <option value="IN_PROGRESS" {% if values.status === 'IN_PROGRESS' %}selected{% endif %}>In Progress</option>
          <option value="DONE" {% if values.status === 'DONE' %}selected{% endif %}>Done</option>
        </select>
      </div>

      <div class="govuk-form-group {% if errors | selectattr('path', 'equalto', 'dueDate') | list | length %}govuk-form-group--error{% endif %}">
        <label class="govuk-label" for="dueDate">Due date and time</label>
        <input class="govuk-input govuk-input--width-20" id="dueDate" name="dueDate"
               type="datetime-local" value="{{ values.dueDate }}" required>
      </div>

      <button type="submit" class="govuk-button">Create task</button>
      <a href="/" class="govuk-button govuk-button--secondary">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
