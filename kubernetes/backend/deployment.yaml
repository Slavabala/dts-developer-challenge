apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-backend
  labels:
    app: task-backend
    version: "1.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: task-backend
  template:
    metadata:
      labels:
        app: task-backend
      annotations:
        # Dynatrace auto-instrumentation
        metrics.dynatrace.com/scrape: "true"
        metrics.dynatrace.com/port: "8080"
        metrics.dynatrace.com/path: "/actuator/prometheus"
    spec:
      containers:
        - name: task-backend
          image: hmcts/task-management-backend:latest
          ports:
            - containerPort: 8080
          env:
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: task-db-secret
                  key: host
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: task-db-secret
                  key: dbname
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: task-db-secret
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: task-db-secret
                  key: password
            - name: REDIS_HOST
              value: task-redis
            - name: REDIS_PORT
              value: "6379"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
