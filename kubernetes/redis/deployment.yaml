apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-redis
  labels:
    app: task-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: task-redis
  template:
    metadata:
      labels:
        app: task-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: task-redis
spec:
  selector:
    app: task-redis
  ports:
    - port: 6379
      targetPort: 6379
  type: ClusterIP
